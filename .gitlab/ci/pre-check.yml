check_pre_commit:
  stage: pre_check
  image: "python:3.11"
  interruptible: true
  tags:
    - build
  dependencies: []
  extends:
    - .rules:pre_check
  cache:
    key: "pip-pre-commit-${CI_PROJECT_NAME}"
    paths:
      - .cache/pip
    policy: pull-push
  before_script:
    - python -m pip install --upgrade pre-commit
  script:
    - |
      if [[ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}" ]]; then
        git fetch origin "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" --depth=1
        git fetch origin "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}" --depth=1
        GIT_DIFF_OUTPUT="$(git diff --name-only "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}")"
      elif [[ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" ]]; then
        git fetch origin "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" --depth=1
        git fetch origin "${CI_COMMIT_SHA}" --depth=1
        GIT_DIFF_OUTPUT="$(git diff --name-only "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" "${CI_COMMIT_SHA}")"
      elif [[ "${CI_COMMIT_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
        git fetch origin "${CI_COMMIT_BEFORE_SHA}" --depth=1
        git fetch origin "${CI_COMMIT_SHA}" --depth=1
        GIT_DIFF_OUTPUT="$(git diff --name-only "${CI_COMMIT_BEFORE_SHA}" "${CI_COMMIT_SHA}")"
      else
        git fetch origin "${CI_COMMIT_SHA}" --depth=2
        GIT_DIFF_OUTPUT="$(git diff --name-only "${CI_COMMIT_SHA}~1" "${CI_COMMIT_SHA}")"
      fi

      MODIFIED_FILES="$(echo "${GIT_DIFF_OUTPUT}" | xargs || true)"
      if [[ -z "${MODIFIED_FILES}" ]]; then
        echo "No modified files for pre-commit."
        exit 0
      fi

      echo "Running pre-commit for: ${MODIFIED_FILES}"
      pre-commit run --files ${MODIFIED_FILES}
  after_script:
    - git diff > pre_commit.patch || true
  artifacts:
    when: always
    expire_in: 4 days
    paths:
      - pre_commit.patch
