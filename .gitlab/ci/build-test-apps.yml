# IDF images to test against. Add or remove tags here to update every board group.
.idf_image_matrix: &idf_image_matrix
  - "espressif/idf:v5.4.4"
  - "espressif/idf:v5.5.4"
  - "espressif/idf:latest"

build_test_apps:
  extends:
    - .rules:build
    - .build_template
  parallel:
    matrix:
      - IDF_IMAGE: *idf_image_matrix
        BOARD: ["esp32_s3_korvo2_v3"]
        IDF_TARGET: ["esp32s3"]
      - IDF_IMAGE: *idf_image_matrix
        BOARD: ["esp32_p4_function_ev"]
        IDF_TARGET: ["esp32p4"]
  script:
    - idf.py --version
    - python -c "from importlib.metadata import version; print('esp-bmgr-assist', version('esp-bmgr-assist'))"
    - cd esp_board_manager/test_apps
    - mkdir -p "logs/${BOARD}"
    - idf.py bmgr -b "${BOARD}" 2>&1 | tee "logs/${BOARD}/bmgr.log"
    - SDKCONFIG_DEFAULTS="sdkconfig.defaults;components/gen_bmgr_codes/board_manager.defaults" idf-build-apps build --paths . --target "${IDF_TARGET}" --parallel-count 1 --parallel-index 1
