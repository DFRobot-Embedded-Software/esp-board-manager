name: Push esp_board_manager to https://components.espressif.com

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  upload_components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Upload esp_board_manager to the component registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: |
            esp_board_manager: ./esp_board_manager
          namespace: "espressif"
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
